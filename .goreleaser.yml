version: 2

dist: release

before:
  hooks:
    - npm ci
    - npm run generate
    - rm -rf backend/frontend
    - cp -r .output/public backend/frontend

builds:
  - dir: backend
    binary: clauductor
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"

nfpms:
  - package_name: clauductor
    vendor: mikolajbadyl
    homepage: https://github.com/mikolajbadyl/clauductor
    maintainer: mikolajbadyl
    description: Web UI for Claude Code
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin

checksum:
  name_template: checksums.txt

changelog:
  sort: asc

release:
  github:
    owner: mikolajbadyl
    name: clauductor
