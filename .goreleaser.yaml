# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

project_name: clauductor

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

release:
  github:
    owner: mikolajbadyl
    name: clauductor
  name_template: "v{{ .Version }}"
  prerelease: auto
  extra_files:
    - glob: ./install.sh
    - glob: ./install.ps1

builds:
  - id: clauductor
    binary: clauductor
    main: .
    dir: backend
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.buildVersion={{ .Version }}

archives:
  - id: clauductor
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - install.sh
      - install.ps1

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  use: github
  sort: asc
  abbrev: 0
  groups:
    - title: "Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "Other Changes"
      order: 999
  filters:
    exclude:
      - "^test:"
      - "^chore:"
      - "typo"
